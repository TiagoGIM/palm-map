name: Deploy Web Staging

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/shared-types/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-staging-web.yml"
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
      CLOUDFLARE_PAGES_PROJECT_STAGING: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_STAGING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web for staging
        run: pnpm --dir apps/web build:staging

      - name: Deploy web to Cloudflare Pages staging
        run: pnpm --dir apps/web exec wrangler pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT_STAGING" --branch staging
